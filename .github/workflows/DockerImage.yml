name: CD - Build Docker Image
on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      # Descarga el código
      - name: Checkout del código
        uses: actions/checkout@v4

      # Construye la imagen Docker
      # Esto verifica que el Dockerfile funciona y que todas
      # las dependencias instalan correctamente
      - name: Build de imagen Docker
        run: docker build -t proyecto-medicamentos:latest .


      - name: Levantar contenedor de prueba
        run: |
          docker run --rm -d \
            --name test-container \
            -p 8000:8000 \
            proyecto-medicamentos:latest

      - name: Verificar que la aplicación responde
        run: |
          sleep 10
          curl --fail http://localhost:8000/docs
       # Para garantizar que el contenedor se detiene
      - name: Detener contenedor
        if: always()
        run: docker stop test-container || true
