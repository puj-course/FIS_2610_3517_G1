#
# Daily, powered by imjohnbo/issue-bot
#

name:  Daily

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];

            await github.rest.issues.update({
              ...context.issue,
              title: `Daily ${today}`,
              body: `Buenos días equipo. Por favor cada integrante, como evidencia del daily, responda las tres preguntas:

## Daily ${today}

1. ¿En qué trabajaste ayer?
2. ¿En qué vas a trabajar hoy?
3. ¿Has tenido algún impedimento?`,
              labels: ['seguimiento']
            });
