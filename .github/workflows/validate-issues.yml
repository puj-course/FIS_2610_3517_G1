name: Formato INVEST en Issues HU

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: read
  
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: 🧾 Formato INVEST de issue HU
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const title = issue.title.trim();
            const body = issue.body ? issue.body.trim() : "";
            
            // ==============================
            // 1️⃣ Verificar si es una Historia de Usuario
            // ==============================
            const isUserStory = title.startsWith("HU");
            
            if (!isUserStory) {
              // Si NO comienza con "HU", simplemente lo ignoramos
              // Este es un issue normal (bug, tarea, etc.) y es válido
              console.log(`ℹ️ Issue #${issue.number} no es una Historia de Usuario. No se valida formato INVEST.`);
              return;
            }
            
            console.log(`🔍 Validando Historia de Usuario: ${title}`);
            
            // ==============================
            // 2️⃣ Validación INVEST para Historias de Usuario
            // ==============================
            const checks = [
              { key: "I", text: "Independiente" },
              { key: "N", text: "Negociable" },
              { key: "V", text: "Valiosa" },
              { key: "E", text: "Estimable" },
              { key: "S", text: "Small (pequeña)" },
              { key: "T", text: "Testable" }
            ];
            
            const missing = checks.filter(c => !body.includes(c.text));
            
            if (missing.length > 0) {
              // Historia de Usuario incompleta
              const list = missing.map(m => `- Falta el criterio **${m.text}** (${m.key})`).join("\n");
              
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: `⚠️ **Historia de Usuario incompleta**\n\nLa historia no cumple completamente el formato INVEST:\n${list}\n\n📋 Por favor, completa estos criterios usando el template de Historia de Usuario.`
              });
              
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: issue.number,
                labels: ["user-story", "review-needed"]
              });
              
              console.log(`⚠️ HU incompleta. Faltan ${missing.length} criterios INVEST.`);
            } else {
              // Historia de Usuario válida
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: "✅ **Historia de Usuario validada**\n\nEl issue cumple con el formato INVEST completo. ¡Excelente trabajo! 🎉"
              });
              
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: issue.number,
                labels: ["user-story", "validated"]
              });
              
              console.log(`✅ HU válida y completa.`);
            }