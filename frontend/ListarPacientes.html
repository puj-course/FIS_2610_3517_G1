<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MedTrack — Pacientes</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --color-menta:        #2DD4BF;
      --color-menta-oscuro: #0F9D8A;
      --color-fondo:        #0F1B2D;
      --color-campo:        #1E2D3D;
      --color-tarjeta:      #162030;
      --color-borde:        #243447;
      --color-texto:        #E2EAF4;
      --color-texto-suave:  #7A95B0;
      --color-error:        #F4726A;
      --color-exito:        #4ADE80;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background-color: var(--color-fondo);
      font-family: 'DM Sans', sans-serif;
      color: var(--color-texto);
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse 60% 50% at 80% 10%, rgba(45,212,191,.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 10% 80%, rgba(45,212,191,.07) 0%, transparent 60%);
    }

    .encabezado-pagina {
      max-width: 1200px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .marca {
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .marca-icono {
      width: 36px;
      height: 36px;
      background: var(--color-menta);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .marca-icono svg { width: 20px; height: 20px; color: var(--color-fondo); }

    .marca-nombre {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--color-texto);
    }

    .boton-nuevo {
      background: var(--color-menta);
      color: var(--color-fondo);
      border: none;
      border-radius: 12px;
      padding: .6rem 1.4rem;
      font-size: .9rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background .2s, box-shadow .2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }
    .boton-nuevo:hover {
      background: var(--color-menta-oscuro);
      box-shadow: 0 8px 24px rgba(45,212,191,.3);
      color: var(--color-fondo);
    }

    .tarjeta {
      background: var(--color-tarjeta);
      border: 1px solid var(--color-borde);
      border-radius: 20px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      box-shadow: 0 32px 80px rgba(0,0,0,.5);
      animation: aparecer .5s ease both;
    }

    @keyframes aparecer {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .titulo-seccion {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
    }

    /* Buscador */
    .barra-busqueda {
      background: var(--color-campo);
      border: 1.5px solid var(--color-borde);
      color: var(--color-texto);
      border-radius: 10px;
      padding: .6rem .9rem;
      font-size: .9rem;
      font-family: 'DM Sans', sans-serif;
      width: 100%;
      max-width: 320px;
      margin-bottom: 1.5rem;
      transition: border-color .2s;
    }
    .barra-busqueda:focus {
      outline: none;
      border-color: var(--color-menta);
      box-shadow: 0 0 0 3px rgba(45,212,191,.18);
    }
    .barra-busqueda::placeholder { color: #4A6278; }

    .table {
      color: var(--color-texto);
      border-color: var(--color-borde);
    }

    .table thead th {
      background: var(--color-campo);
      color: var(--color-menta);
      border-color: var(--color-borde);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 500;
      padding: .85rem 1rem;
      white-space: nowrap;
    }

    .table tbody tr {
      border-color: var(--color-borde);
      transition: background .15s;
    }

    .table tbody tr:hover { background: rgba(45,212,191,.05); }

    .table tbody td {
      border-color: var(--color-borde);
      padding: .8rem 1rem;
      font-size: .88rem;
      vertical-align: middle;
    }

    .vacio {
      text-align: center;
      color: var(--color-texto-suave);
      padding: 3rem !important;
    }

    .alerta-error {
      background: rgba(244,114,106,.1);
      border: 1px solid var(--color-error);
      color: var(--color-error);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: none;
    }

    /* Spinner de carga */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--color-borde);
      border-top-color: var(--color-menta);
      border-radius: 50%;
      animation: girar .7s linear infinite;
      vertical-align: middle;
      margin-right: .5rem;
    }
    @keyframes girar { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .tarjeta { padding: 1.25rem; }
    }
  </style>
</head>
<body>

  <div class="encabezado-pagina">
    <div class="marca">
      <div class="marca-icono">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <span class="marca-nombre">MedTrack</span>
    </div>

    <a href="RegistrarPaciente.html" class="boton-nuevo">+ Nuevo paciente</a>
  </div>

  <div class="tarjeta">
    <h2 class="titulo-seccion">Lista de Pacientes</h2>

    <!-- Buscador en tiempo real -->
    <input
      type="text"
      class="barra-busqueda"
      id="campoBusqueda"
      placeholder="Buscar por nombre, documento…"
    />

    <div class="alerta-error" id="alertaError"></div>

    <div class="table-responsive">
      <table class="table">
        <thead>
          <tr>
            <th>Nombres</th>
            <th>Apellidos</th>
            <th>Fecha nac.</th>
            <th>Género</th>
            <th>Tipo doc.</th>
            <th>N.º documento</th>
            <th>Teléfono</th>
            <th>EPS</th>
            <th>Diagnóstico</th>
            <th>Alergias</th>
            <th>Observaciones</th>
          </tr>
        </thead>
        <tbody id="tablaPacientes">
          <tr>
            <td class="vacio" colspan="11">
              <span class="spinner"></span> Cargando pacientes…
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ✅ SUB-03: Importamos api.js antes de cerrar body -->
  <script src="api.js"></script>

  <script>
    const tbody        = document.getElementById('tablaPacientes');
    const alertaError  = document.getElementById('alertaError');
    const campoBusqueda = document.getElementById('campoBusqueda');

    // Guardamos los pacientes para el filtro en tiempo real
    let pacientesCargados = [];

    function mostrarError(mensaje) {
      alertaError.textContent = mensaje;
      alertaError.style.display = 'block';
    }

    function renderizarFilas(pacientes) {
      if (!pacientes.length) {
        tbody.innerHTML = `<tr><td class="vacio" colspan="11">No hay pacientes que coincidan con la búsqueda.</td></tr>`;
        return;
      }
      tbody.innerHTML = pacientes.map(function (p) {
        return `
          <tr>
            <td>${p.nombres}</td>
            <td>${p.apellidos}</td>
            <td>${p.fecha_nacimiento}</td>
            <td>${p.genero}</td>
            <td>${p.tipo_documento}</td>
            <td>${p.numero_documento}</td>
            <td>${p.telefono_contacto || '—'}</td>
            <td>${p.eps_aseguradora || '—'}</td>
            <td>${p.diagnostico_principal || '—'}</td>
            <td>${p.alergias_conocidas || '—'}</td>
            <td>${p.observaciones_adicionales || '—'}</td>
          </tr>
        `;
      }).join('');
    }

    // Filtro en tiempo real al escribir en el buscador
    campoBusqueda.addEventListener('input', function () {
      const termino = this.value.toLowerCase();
      const filtrados = pacientesCargados.filter(function (p) {
        return (
          p.nombres.toLowerCase().includes(termino) ||
          p.apellidos.toLowerCase().includes(termino) ||
          p.numero_documento.toLowerCase().includes(termino)
        );
      });
      renderizarFilas(filtrados);
    });

    // ✅ SUB-03: Reemplazamos fetch directo por api.obtenerPacientes
    api.obtenerPacientes()
      .then(function (resultado) {
        if (!resultado.ok) {
          mostrarError('Error al cargar los pacientes.');
          tbody.innerHTML = `<tr><td class="vacio" colspan="11">No se pudieron cargar los pacientes.</td></tr>`;
          return;
        }
        const pacientes = resultado.body.pacientes || resultado.body;
        pacientesCargados = pacientes;

        if (!pacientes.length) {
          tbody.innerHTML = `<tr><td class="vacio" colspan="11">No hay pacientes registrados aún.</td></tr>`;
          return;
        }
        renderizarFilas(pacientes);
      })
      .catch(function () {
        mostrarError('No se pudo conectar con el servidor.');
        tbody.innerHTML = `<tr><td class="vacio" colspan="11">Error de conexión con el backend.</td></tr>`;
      });
  </script>

</body>
</html>
