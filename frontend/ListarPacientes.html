<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MedTrack — Pacientes</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --color-menta:        #2DD4BF;
      --color-menta-oscuro: #0F9D8A;
      --color-fondo:        #0F1B2D;
      --color-campo:        #1E2D3D;
      --color-tarjeta:      #162030;
      --color-borde:        #243447;
      --color-texto:        #E2EAF4;
      --color-texto-suave:  #7A95B0;
      --color-error:        #F4726A;
      --color-exito:        #4ADE80;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background-color: var(--color-fondo);
      font-family: 'DM Sans', sans-serif;
      color: var(--color-texto);
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse 60% 50% at 80% 10%, rgba(45,212,191,.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 10% 80%, rgba(45,212,191,.07) 0%, transparent 60%);
    }

    .encabezado-pagina {
      max-width: 1200px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .marca {
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .marca-icono {
      width: 36px;
      height: 36px;
      background: var(--color-menta);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .marca-icono svg { width: 20px; height: 20px; color: var(--color-fondo); }

    .marca-nombre {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--color-texto);
    }

    .boton-nuevo {
      background: var(--color-menta);
      color: var(--color-fondo);
      border: none;
      border-radius: 12px;
      padding: .6rem 1.4rem;
      font-size: .9rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background .2s, box-shadow .2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }
    .boton-nuevo:hover {
      background: var(--color-menta-oscuro);
      box-shadow: 0 8px 24px rgba(45,212,191,.3);
      color: var(--color-fondo);
    }

    .tarjeta {
      background: var(--color-tarjeta);
      border: 1px solid var(--color-borde);
      border-radius: 20px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      box-shadow: 0 32px 80px rgba(0,0,0,.5);
      animation: aparecer .5s ease both;
    }

    @keyframes aparecer {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .titulo-seccion {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
    }

    /* Buscador */
    .barra-busqueda {
      background: var(--color-campo);
      border: 1.5px solid var(--color-borde);
      color: var(--color-texto);
      border-radius: 10px;
      padding: .6rem .9rem;
      font-size: .9rem;
      font-family: 'DM Sans', sans-serif;
      width: 100%;
      max-width: 320px;
      margin-bottom: 1.5rem;
      transition: border-color .2s;
    }
    .barra-busqueda:focus {
      outline: none;
      border-color: var(--color-menta);
      box-shadow: 0 0 0 3px rgba(45,212,191,.18);
    }
    .barra-busqueda::placeholder { color: #4A6278; }

    .table {
      color: var(--color-texto);
      border-color: var(--color-borde);
    }

    .table thead th {
      background: var(--color-campo);
      color: var(--color-menta);
      border-color: var(--color-borde);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 500;
      padding: .85rem 1rem;
      white-space: nowrap;
    }

    .table tbody tr {
      border-color: var(--color-borde);
      transition: background .15s;
    }

    .table tbody tr:hover { background: rgba(45,212,191,.05); }

    .table tbody tr.fila-paciente {
      cursor: pointer;
    }
    .table tbody tr.fila-paciente:hover {
      background: rgba(45,212,191,.10);
    }
    .badge-ver {
      background: transparent;
      border: 1px solid var(--color-menta);
      color: var(--color-menta);
      border-radius: 8px;
      padding: .25rem .65rem;
      font-size: .78rem;
      font-weight: 600;
      white-space: nowrap;
      transition: background .15s, color .15s;
    }
    .fila-paciente:hover .badge-ver {
      background: var(--color-menta);
      color: var(--color-fondo);
    }

    .table tbody td {
      border-color: var(--color-borde);
      padding: .8rem 1rem;
      font-size: .88rem;
      vertical-align: middle;
    }

    .vacio {
      text-align: center;
      color: var(--color-texto-suave);
      padding: 3rem !important;
    }

    .alerta-error {
      background: rgba(244,114,106,.1);
      border: 1px solid var(--color-error);
      color: var(--color-error);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: none;
    }

    /* Spinner de carga */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--color-borde);
      border-top-color: var(--color-menta);
      border-radius: 50%;
      animation: girar .7s linear infinite;
      vertical-align: middle;
      margin-right: .5rem;
    }
    @keyframes girar { to { transform: rotate(360deg); } }

    .badge-alerta-tomas {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  border-radius: 999px;
  padding: .28rem .65rem;
  font-size: .76rem;
  font-weight: 700;
  white-space: nowrap;
  border: 1px solid transparent;
}

.badge-alerta-atrasada {
  background: rgba(250, 204, 21, .12);
  border-color: rgba(250, 204, 21, .45);
  color: #FACC15;
}

.badge-alerta-omitida {
  background: rgba(248, 113, 113, .12);
  border-color: rgba(248, 113, 113, .45);
  color: #F87171;
}

.badge-alerta-mixta {
  background: rgba(251, 146, 60, .12);
  border-color: rgba(251, 146, 60, .45);
  color: #FB923C;
}

.texto-sin-alerta {
  color: var(--color-texto-suave);
  font-size: .8rem;
}

    @media (max-width: 768px) {
      .tarjeta { padding: 1.25rem; }
    }
  </style>
</head>
<body>

    <div class="encabezado-pagina">
        <div class="marca">
            <div class="marca-icono">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
            </div>
            <span class="marca-nombre">MedTrack</span>
        </div>

        <a href="RegistrarPaciente.html" class="boton-nuevo">+ Nuevo paciente</a>
    </div>

    <div class="tarjeta">
        <h2 class="titulo-seccion">Lista de Pacientes</h2>

        <!-- Buscador en tiempo real -->
        <input type="text"
               class="barra-busqueda"
               id="campoBusqueda"
               placeholder="Buscar por nombre, documento…" />

        <div class="alerta-error" id="alertaError"></div>

        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>Nombres</th>
                        <th>Apellidos</th>
                        <th>Fecha nac.</th>
                        <th>Género</th>
                        <th>Tipo doc.</th>
                        <th>N.º documento</th>
                        <th>Teléfono</th>
                        <th>EPS</th>
                        <th>Diagnóstico</th>
                        <th>Alergias</th>
                        <th>Observaciones</th>
                        <th>Alertas</th>
                        <th>Acción</th>  
                    </tr>
                </thead>
                <tbody id="tablaPacientes">
                    <tr>
                        <td class="vacio" colspan="13">
                            <span class="spinner"></span> Cargando pacientes…
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ✅ SUB-03: Importamos api.js antes de cerrar body -->
    <script src="api.js"></script>

    <script>
        const COLUMNAS_TABLA = 13;

        const tbody = document.getElementById('tablaPacientes');
        const alertaError = document.getElementById('alertaError');
        const campoBusqueda = document.getElementById('campoBusqueda');

        let pacientesCargados = [];

        function mostrarError(mensaje) {
            alertaError.textContent = mensaje;
            alertaError.style.display = 'block';
        }

        function ocultarError() {
            alertaError.textContent = '';
            alertaError.style.display = 'none';
        }

        function normalizarTexto(valor, usarGuion = true) {
            if (valor === null || valor === undefined || valor === '') {
                return usarGuion ? '—' : '';
            }
            return String(valor);
        }

        function crearFilaEstado(mensaje) {
            const tr = document.createElement('tr');
            const td = document.createElement('td');

            td.className = 'vacio';
            td.colSpan = COLUMNAS_TABLA;
            td.textContent = mensaje;

            tr.appendChild(td);
            return tr;
        }

        function mostrarEstadoTabla(mensaje) {
            tbody.replaceChildren(crearFilaEstado(mensaje));
        }

        function crearCelda(valor, usarGuion = true) {
            const td = document.createElement('td');
            td.textContent = normalizarTexto(valor, usarGuion);
            return td;
        }

        function crearCeldaAlerta(paciente) {
            const td = document.createElement('td');

            const alerta = paciente.alerta || {
                tiene_alerta: Boolean(
                    paciente.tiene_tomas_atrasadas || paciente.tiene_tomas_omitidas
                ),
                tipo: paciente.alerta_tomas || 'sin_alerta',
                atrasadas: paciente.total_tomas_atrasadas || 0,
                omitidas: paciente.total_tomas_omitidas || 0,
                total: (paciente.total_tomas_atrasadas || 0) + (paciente.total_tomas_omitidas || 0)
           };

            if (!alerta.tiene_alerta || alerta.tipo === 'sin_alerta') {
                td.innerHTML = '<span class="texto-sin-alerta">Sin alerta</span>';
                return td;
            }

            if (alerta.tipo === 'mixta') {
                td.innerHTML = `
                     <span class="badge-alerta-tomas badge-alerta-mixta">
                        ⚠️ ${alerta.atrasadas} atrasada(s) / ${alerta.omitidas} omitida(s)
                      </span>
                `;
                return td;
             }

            if (alerta.tipo === 'omitida') {
                td.innerHTML = `
                    <span class="badge-alerta-tomas badge-alerta-omitida">
                        🚨 ${alerta.omitidas} omitida(s)
                    </span>
                `;
                return td;
             }

              if (alerta.tipo === 'atrasada') {
                  td.innerHTML = `
                      <span class="badge-alerta-tomas badge-alerta-atrasada">
                          ⏰ ${alerta.atrasadas} atrasada(s)
                      </span>
                  `;
                  return td;
              }

               td.innerHTML = '<span class="texto-sin-alerta">Sin alerta</span>';
              return td;
        }
        function crearFilaPaciente(paciente) {
            const tr = document.createElement('tr');

            tr.classList.add('fila-paciente');
            tr.setAttribute('title', 'Ver resumen de ' + (paciente.nombres || '') + ' ' + (paciente.apellidos || ''));
            tr.addEventListener('click', function() {
                navegarAResumen(paciente.id);
            });

            tr.appendChild(crearCelda(paciente.nombres, false));
            tr.appendChild(crearCelda(paciente.apellidos, false));
            tr.appendChild(crearCelda(paciente.fecha_nacimiento, false));
            tr.appendChild(crearCelda(paciente.genero, false));
            tr.appendChild(crearCelda(paciente.tipo_documento, false));
            tr.appendChild(crearCelda(paciente.numero_documento, false));
            tr.appendChild(crearCelda(paciente.telefono_contacto));
            tr.appendChild(crearCelda(paciente.eps_aseguradora));
            tr.appendChild(crearCelda(paciente.diagnostico_principal));
            tr.appendChild(crearCelda(paciente.alergias_conocidas));
            tr.appendChild(crearCelda(paciente.observaciones_adicionales));
            tr.appendChild(crearCeldaAlerta(paciente));

            // Columna acción
            const tdAccion = document.createElement('td');
            tdAccion.innerHTML = '<span class="badge-ver">Ver resumen</span>';
            tr.appendChild(tdAccion);

            return tr;
        }

        function navegarAResumen(pacienteId) {
            if (!pacienteId) return;
            window.location.href = 'resumenPaciente.html?id=' + pacienteId;
        }

        function renderizarFilas(pacientes) {
            if (!Array.isArray(pacientes) || pacientes.length === 0) {
                mostrarEstadoTabla('No hay pacientes que coincidan con la búsqueda.');
                return;
            }

            const fragmento = document.createDocumentFragment();

            pacientes.forEach((paciente) => {
                fragmento.appendChild(crearFilaPaciente(paciente));
            });

            tbody.replaceChildren(fragmento);
        }

        function coincideBusqueda(paciente, termino) {
            const nombre = normalizarTexto(paciente.nombres, false).toLowerCase();
            const apellido = normalizarTexto(paciente.apellidos, false).toLowerCase();
            const documento = normalizarTexto(paciente.numero_documento, false).toLowerCase();

            return (
                nombre.includes(termino) ||
                apellido.includes(termino) ||
                documento.includes(termino)
            );
        }

        campoBusqueda.addEventListener('input', () => {
            const termino = campoBusqueda.value.trim().toLowerCase();
            const filtrados = pacientesCargados.filter((paciente) =>
                coincideBusqueda(paciente, termino)
            );

            renderizarFilas(filtrados);
        });

        async function cargarPacientes() {
            try {
                ocultarError();

                const resultado = await api.obtenerPacientes();

                if (!resultado.ok) {
                    mostrarError('Error al cargar los pacientes.');
                    mostrarEstadoTabla('No se pudieron cargar los pacientes.');
                    return;
                }

                const pacientes = resultado.body?.pacientes ?? resultado.body ?? [];
                pacientesCargados = Array.isArray(pacientes) ? pacientes : [];

                if (pacientesCargados.length === 0) {
                    mostrarEstadoTabla('No hay pacientes registrados aún.');
                    return;
                }

                renderizarFilas(pacientesCargados);
            } catch (error) {
                mostrarError('No se pudo conectar con el servidor.');
                mostrarEstadoTabla('Error de conexión con el backend.');
                console.error(error);
            }
        }

        cargarPacientes();
    </script>

</body>
</html>
