<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MedTrack — Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand fw-bold">💊 MedTrack</span>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white" id="nombre-usuario"></span>
        <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
</nav>

<div class="container mt-5">
    <h2>Bienvenido/a al dashboard</h2>
    <p class="text-muted">Aquí irá el contenido principal de MedTrack.</p>

<div id="estado-carga" class="text-center mt-4">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Cargando pacientes...</p>
</div>

<div id="estado-error" class="alert alert-danger mt-4" style="display:none">
        <p id="mensaje-error" class="mb-2"></p>
        <button class="btn btn-sm btn-danger" onclick="cargarPacientes()">Reintentar</button>
 </div>

    <div id="lista-pacientes" style="display:none"></div>

    <div id="estado-vacio" class="text-center mt-4" style="display:none">
        <p class="text-muted">No hay pacientes registrados aún.</p>
        <a href="RegistrarPaciente.html" class="btn btn-primary">+ Agregar paciente</a>
    </div>
</div>

<script>
    const token = localStorage.getItem("medtrack_token");
    const usuario = JSON.parse(localStorage.getItem("medtrack_usuario") || "null");

    if (!token || !usuario) {
        window.location.href = "login.html";
    } else {
        document.getElementById("nombre-usuario").textContent =
            `${usuario.nombre} (${usuario.rol})`;
    }

    function cerrarSesion() {
        localStorage.removeItem("medtrack_token");
        localStorage.removeItem("medtrack_usuario");
        window.location.href = "login.html";
    }

 //Servicio HTTP: obtener lista de pacientes
    async function obtenerPacientes() {
        const response = await fetch("http://localhost:8000/pacientes", {
            method: "GET",
            headers: {
                "Authorization": `Bearer ${token}`
            }
        });

        if (!response.ok) {
            throw new Error(`Error ${response.status}: no se pudo obtener la lista de pacientes`);
        }

        return await response.json();
    }
   // — Gestión de estado y carga de pacientes
    async function cargarPacientes() {
        document.getElementById("estado-carga").style.display = "block";
        document.getElementById("estado-error").style.display = "none";
        document.getElementById("lista-pacientes").style.display = "none";

        try {
            const pacientes = await obtenerPacientes();
            document.getElementById("estado-carga").style.display = "none";
            document.getElementById("lista-pacientes").style.display = "block";
            renderizarListaPacientes(pacientes);
        } catch (error) {
            document.getElementById("estado-carga").style.display = "none";
            document.getElementById("mensaje-error").textContent = error.message;
            document.getElementById("estado-error").style.display = "block";
        }
    }

    //  Renderizar lista de pacientes con datos reales
    function renderizarListaPacientes(pacientes) {
    const contenedor = document.getElementById("lista-pacientes");
    contenedor.innerHTML = "";

    pacientes.forEach(paciente => {
        const tarjeta = document.createElement("div");
        tarjeta.classList.add("card", "mb-3");
        tarjeta.innerHTML = `
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="card-title mb-1">${paciente.nombres} ${paciente.apellidos}</h5>
                    <p class="card-text text-muted mb-0">
                        Documento: ${paciente.tipo_documento} ${paciente.numero_documento}
                        &nbsp;|&nbsp;
                        Diagnóstico: ${paciente.diagnostico_principal || "Sin diagnóstico registrado"}
                    </p>
                </div>
                <a href="patients.html?id=${paciente.id}" class="btn btn-primary btn-sm">
                    Ver detalle
                </a>
            </div>
        `;
        contenedor.appendChild(tarjeta);
    });
}

    // Se ejecuta automáticamente al cargar la página
    document.addEventListener("DOMContentLoaded", cargarPacientes);
</script>

</body>
</html>
