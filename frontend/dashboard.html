<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MedTrack — Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand fw-bold">💊 MedTrack</span>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white" id="nombre-usuario"></span>
        <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
</nav>

<div class="container mt-5">
    <h2>Bienvenido/a al dashboard</h2>
    <p class="text-muted">Aquí irá el contenido principal de MedTrack.</p>
</div>

<script>
    const token = localStorage.getItem("medtrack_token");
    const usuario = JSON.parse(localStorage.getItem("medtrack_usuario") || "null");

    if (!token || !usuario) {
        window.location.href = "login.html";
    } else {
        document.getElementById("nombre-usuario").textContent =
            `${usuario.nombre} (${usuario.rol})`;
    }

    function cerrarSesion() {
        localStorage.removeItem("medtrack_token");
        localStorage.removeItem("medtrack_usuario");
        window.location.href = "login.html";
    }

 //Servicio HTTP: obtener lista de pacientes
    async function obtenerPacientes() {
        const response = await fetch("http://localhost:8000/pacientes", {
            method: "GET",
            headers: {
                "Authorization": `Bearer ${token}`
            }
        });

        if (!response.ok) {
            throw new Error(`Error ${response.status}: no se pudo obtener la lista de pacientes`);
        }

        return await response.json();
    }
     // HU-I03.2 — Gestión de estado y carga de pacientes
    async function cargarPacientes() {
        document.getElementById("estado-carga").style.display = "block";
        document.getElementById("estado-error").style.display = "none";
        document.getElementById("lista-pacientes").style.display = "none";

        try {
            const pacientes = await obtenerPacientes();
            document.getElementById("estado-carga").style.display = "none";
            document.getElementById("lista-pacientes").style.display = "block";
            renderizarListaPacientes(pacientes);
        } catch (error) {
            document.getElementById("estado-carga").style.display = "none";
            document.getElementById("mensaje-error").textContent = error.message;
            document.getElementById("estado-error").style.display = "block";
        }
    }

    // Se ejecuta automáticamente al cargar la página
    document.addEventListener("DOMContentLoaded", cargarPacientes);
</script>

</body>
</html>
