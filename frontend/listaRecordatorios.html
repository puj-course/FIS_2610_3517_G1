<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedTrack — Panel del día</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <style>
        :root {
            --color-menta: #2DD4BF;
            --color-menta-oscuro: #0F9D8A;
            --color-fondo: #0F1B2D;
            --color-campo: #1E2D3D;
            --color-tarjeta: #162030;
            --color-borde: #243447;
            --color-texto: #E2EAF4;
            --color-texto-suave: #7A95B0;
            --color-error: #F4726A;
            --color-exito: #4ADE80;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background-color: var(--color-fondo);
            font-family: 'DM Sans', sans-serif;
            color: var(--color-texto);
            padding: 2rem 1rem;
            background-image: radial-gradient(ellipse 60% 50% at 80% 10%, rgba(45,212,191,.12) 0%, transparent 70%), radial-gradient(ellipse 40% 40% at 10% 80%, rgba(45,212,191,.07) 0%, transparent 60%);
        }

        .encabezado-pagina {
            max-width: 1100px;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .marca {
            display: flex;
            align-items: center;
            gap: .6rem;
        }

        .marca-icono {
            width: 36px;
            height: 36px;
            background: var(--color-menta);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            .marca-icono svg {
                width: 20px;
                height: 20px;
                color: var(--color-fondo);
            }

        .marca-nombre {
            font-family: 'DM Serif Display', serif;
            font-size: 1.4rem;
            color: var(--color-texto);
        }

        .boton-nuevo {
            background: var(--color-menta);
            color: var(--color-fondo);
            border: none;
            border-radius: 12px;
            padding: .6rem 1.4rem;
            font-size: .9rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background .2s, box-shadow .2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: .4rem;
        }

            .boton-nuevo:hover {
                background: var(--color-menta-oscuro);
                box-shadow: 0 8px 24px rgba(45,212,191,.3);
                color: var(--color-fondo);
            }

        .tarjeta {
            background: var(--color-tarjeta);
            border: 1px solid var(--color-borde);
            border-radius: 20px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
            box-shadow: 0 32px 80px rgba(0,0,0,.5);
            animation: aparecer .5s ease both;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .titulo-seccion {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .table {
            color: var(--color-texto);
            border-color: var(--color-borde);
        }

            .table thead th {
                background: var(--color-campo);
                color: var(--color-menta);
                border-color: var(--color-borde);
                font-size: .82rem;
                text-transform: uppercase;
                letter-spacing: .05em;
                font-weight: 500;
                padding: .85rem 1rem;
            }

            .table tbody tr {
                border-color: var(--color-borde);
                transition: background .15s;
            }

                .table tbody tr:hover {
                    background: rgba(45,212,191,.05);
                }

            .table tbody td {
                border-color: var(--color-borde);
                padding: .85rem 1rem;
                font-size: .9rem;
                vertical-align: middle;
            }

        .vacio {
            text-align: center;
            color: var(--color-texto-suave);
            padding: 3rem !important;
        }

        .alerta-error {
            background: rgba(244,114,106,.1);
            border: 1px solid var(--color-error);
            color: var(--color-error);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .badge-tomada {
            background: rgba(74,222,128,.15);
            color: var(--color-exito);
            border: 1px solid var(--color-exito);
            border-radius: 20px;
            padding: .2rem .7rem;
            font-size: .78rem;
            font-weight: 500;
        }

        .badge-pendiente {
            background: rgba(244,114,106,.12);
            color: #fca5a5;
            border: 1px solid #fca5a5;
            border-radius: 20px;
            padding: .2rem .7rem;
            font-size: .78rem;
            font-weight: 500;
        }

        .boton-tomada {
            background: var(--color-menta);
            color: var(--color-fondo);
            border: none;
            border-radius: 10px;
            padding: .45rem .9rem;
            font-size: .82rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s, box-shadow .2s;
        }

            .boton-tomada:hover {
                background: var(--color-menta-oscuro);
                box-shadow: 0 8px 20px rgba(45,212,191,.25);
            }
    </style>
</head>

      /*
      Marca un recordatorio como tomado y elimina la alerta visual.
      */
      async function marcarComoTomado(recordatorioId, elementoAlerta) {
          const token = localStorage.getItem("medtrack_token") || "test";

          try {
              const respuesta = await fetch(`http://localhost:8000/recordatorios/${recordatorioId}/tomado`, {
                  method: "PATCH",
                  headers: { "Authorization": `Bearer ${token}` }
              });

              if (respuesta.ok) {
                  /* Si se marcó correctamente, eliminamos la alerta de la pantalla */
                  elementoAlerta.remove();
              }
          } catch (err) {
              console.log("Error al marcar como tomado:", err);
          }
      }
