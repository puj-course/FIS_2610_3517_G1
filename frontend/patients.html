<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedTrack - Detalle del Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-menta: #2DD4BF;
            --color-fondo: #0F1B2D;
            --color-tarjeta: #162030;
            --color-borde: #243447;
            --color-texto: #E2EAF4;
        }
        body {
            background-color: var(--color-fondo);
            font-family: 'DM Sans', sans-serif;
            color: var(--color-texto);
            padding: 2rem;
        }
        .tarjeta {
            background: var(--color-tarjeta);
            border: 1px solid var(--color-borde);
            border-radius: 20px;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        .btn-volver {
            background: var(--color-menta);
            color: var(--color-fondo);
            border: none;
            border-radius: 10px;
            padding: 0.5rem 1rem;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 1rem;
        }
        .btn-volver:hover {
            background: #0F9D8A;
            color: white;
        }
        .medicamento-card {
            background: rgba(45,212,191,.1);
            border: 1px solid var(--color-borde);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<div class="tarjeta">
    <a href="dashboard.html" class="btn-volver">← Volver al Dashboard</a>
    
    <div id="contenido">
        <div class="text-center">
            <div class="spinner-border text-success" role="status"></div>
            <p>Cargando información del paciente...</p>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
    // Obtener el ID del paciente de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const pacienteId = urlParams.get('id');

    async function cargarDetallePaciente() {
        const contenedor = document.getElementById('contenido');
        
        if (!pacienteId) {
            contenedor.innerHTML = `
                <div class="alert alert-danger">
                    No se especificó un paciente válido.
                    <br><a href="dashboard.html" class="btn btn-primary mt-2">Volver al dashboard</a>
                </div>
            `;
            return;
        }

        try {
            // Obtener todos los pacientes
            const resultado = await api.obtenerPacientes();
            
            if (!resultado.ok) {
                throw new Error('Error al cargar pacientes');
            }

            const pacientes = resultado.body;
            const paciente = pacientes.find(p => p.id == pacienteId);

            if (!paciente) {
                contenedor.innerHTML = `
                    <div class="alert alert-warning">
                        No se encontró el paciente con ID ${pacienteId}
                        <br><a href="dashboard.html" class="btn btn-primary mt-2">Volver al dashboard</a>
                    </div>
                `;
                return;
            }

            // Cargar medicamentos del paciente
            const medicamentosResult = await api.obtenerMedicamentos(pacienteId);
            const medicamentos = medicamentosResult.ok ? medicamentosResult.body : [];

            // Mostrar información
            contenedor.innerHTML = `
                <h2>${paciente.nombres} ${paciente.apellidos}</h2>
                <hr>
                <div class="row">
                    <div class="col-md-6">
                        <p><strong>📄 Documento:</strong> ${paciente.tipo_documento} ${paciente.numero_documento}</p>
                        <p><strong>🎂 Fecha nacimiento:</strong> ${paciente.fecha_nacimiento}</p>
                        <p><strong>⚥ Género:</strong> ${paciente.genero}</p>
                        <p><strong>📞 Teléfono:</strong> ${paciente.telefono_contacto || '—'}</p>
                    </div>
                    <div class="col-md-6">
                        <p><strong>🏥 EPS:</strong> ${paciente.eps_aseguradora || '—'}</p>
                        <p><strong>🩺 Diagnóstico:</strong> ${paciente.diagnostico_principal || '—'}</p>
                        <p><strong>⚠️ Alergias:</strong> ${paciente.alergias_conocidas || '—'}</p>
                    </div>
                </div>
                
                <hr>
                <h3>💊 Medicamentos</h3>
                ${medicamentos.length === 0 ? 
                    '<p class="text-muted">No hay medicamentos registrados para este paciente.</p>' : 
                    medicamentos.map(m => `
                        <div class="medicamento-card">
                            <h4>${m.nombre}</h4>
                            <p><strong>Dosis:</strong> ${m.dosis}</p>
                            <p><strong>Frecuencia:</strong> ${m.frecuencia}</p>
                            <p><strong>Horario:</strong> ${m.horario}</p>
                            <p><strong>Fecha inicio:</strong> ${m.fecha_inicio}</p>
                            ${m.observaciones ? `<p><strong>Observaciones:</strong> ${m.observaciones}</p>` : ''}
                        </div>
                    `).join('')
                }
                
                <div class="mt-4">
                    <a href="registro_medicamento.html?paciente_id=${pacienteId}" class="btn btn-success">+ Agregar Medicamento</a>
                    <a href="dashboard.html" class="btn btn-secondary">Volver</a>
                </div>
            `;

        } catch (error) {
            console.error('Error:', error);
            contenedor.innerHTML = `
                <div class="alert alert-danger">
                    Error de conexión con el servidor.
                    <br><a href="dashboard.html" class="btn btn-primary mt-2">Volver al dashboard</a>
                </div>
            `;
        }
    }

    // Ejecutar al cargar
    cargarDetallePaciente();
</script>

</body>
</html>
